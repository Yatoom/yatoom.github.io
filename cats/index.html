<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f1f5f9;
      --surface:  #ffffff;
      --border:   rgba(0,0,0,.08);
      --text:     #0f172a;
      --muted:    #64748b;
      --accent:   #3b82f6;

      --gen1: #f59e0b;
      --gen2: #10b981;
      --gen3: #3b82f6;
      --gen4: #a855f7;
      --gen5: #ec4899;
      --gen6: #eab308;
    }

    html.dark {
      --bg:      #0f172a;
      --surface: #1e293b;
      --border:  rgba(255,255,255,.07);
      --text:    #f1f5f9;
      --muted:   #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background .3s, color .3s;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    nav {
      flex: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    nav a { text-decoration: none; color: var(--muted); font-size: 13px; font-weight: 600; transition: color .2s; }
    nav a:hover, nav a.active { color: var(--accent); }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-links { display: flex; gap: 24px; }
    #theme-toggle {
      background: none; border: none; cursor: pointer;
      color: var(--muted); width: 36px; height: 36px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    #theme-toggle:hover { background: var(--border); }

    /* ── MAIN CANVAS AREA ── */
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #graph-svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #graph-svg:active { cursor: grabbing; }

    /* ── CONTROLS ── */
    .controls {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      z-index: 10;
    }
    .ctrl-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); width: 32px; height: 32px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: background .15s, color .15s;
    }
    .ctrl-btn:hover { background: var(--border); color: var(--text); }
    .ctrl-divider { width: 1px; height: 20px; background: var(--border); }

    /* ── LEGEND ── */
    .legend {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      z-index: 10;
      min-width: 130px;
    }
    .legend h4 {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted); margin-bottom: 10px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text); margin-bottom: 6px; cursor: pointer;
      opacity: 1; transition: opacity .2s;
    }
    .legend-item.dimmed { opacity: .3; }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%; flex: none;
    }

    /* ── NODE TOOLTIP / CARD ── */
    #tooltip {
      position: absolute;
      pointer-events: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 16px 48px rgba(0,0,0,.18);
      width: 180px;
      z-index: 200;
      opacity: 0;
      transform: scale(.95) translateY(4px);
      transition: opacity .18s, transform .18s;
    }
    #tooltip.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    #tooltip img {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      border-radius: 10px; margin-bottom: 10px;
      display: block;
    }
    #tooltip .no-photo {
      width: 100%; aspect-ratio: 1;
      background: var(--bg);
      border-radius: 10px; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
    }
    #tooltip h3 { font-size: 14px; font-weight: 700; color: var(--text); }
    #tooltip .gen-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 999px;
      font-size: 10px; font-weight: 700; margin-top: 4px;
    }
    #tooltip .birth {
      font-size: 10px; color: var(--muted); margin-top: 6px;
      display: flex; align-items: center; gap: 4px;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.88); backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: min(90vw, 800px); max-height: 85vh;
      border-radius: 16px; object-fit: contain;
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }
    #lb-name {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.6); color: #fff; font-weight: 700; font-size: 15px;

    #lb-close {

    }

    .node circle.bg {

      .nav-links { display: none; }

// ── LAYOUT ───────────────────────────────────────────────────────────────────
let simulation;

function buildLayeredLayout() {
  if (simulation) simulation.stop();

  const nodesCopy = nodes.map(d => ({ ...d }));
  const linksCopy = links.map(d => ({ ...d }));

  const ROW_H       = 148;
  const TOP         = 75;
  const NODE_W      = 76;
  const SIBLING_GAP = 8;
  const FAMILY_GAP  = 38;

  const childrenOf = {};
  links.forEach(l => {
    if (!childrenOf[l.source]) childrenOf[l.source] = [];
    childrenOf[l.source].push(l.target);
  });

  const childIds = new Set(links.map(l => l.target));
  const roots = nodesCopy.filter(n => !childIds.has(n.id));

  const subtreeW = {};
  function calcWidth(id) {
    const kids = childrenOf[id] || [];
    if (kids.length === 0) {
      subtreeW[id] = NODE_W;
      return NODE_W;
    }
    let w = kids.reduce((sum, kid, i) => {
      return sum + calcWidth(kid) + (i < kids.length - 1 ? SIBLING_GAP : 0);
    }, 0);
    subtreeW[id] = w;
    return w;
  }
  roots.forEach(r => calcWidth(r.id));

  const xPos = {};
  function assignX(id, left) {
    const kids = childrenOf[id] || [];
    if (kids.length === 0) {
      xPos[id] = left + NODE_W / 2;
      return;
    }
    let cursor = left;
    kids.forEach(kid => {
      assignX(kid, cursor);
      cursor += subtreeW[kid] + SIBLING_GAP;
    });
    xPos[id] = (xPos[kids[0]] + xPos[kids[kids.length - 1]]) / 2;
  }

  let cursor = 0;
  roots.forEach(root => {
    assignX(root.id, cursor);
    cursor += subtreeW[root.id] + FAMILY_GAP;
  });

  nodesCopy.forEach(n => {
    n.x = xPos[n.id] || 0;
    n.y = TOP + (n.gen - 1) * ROW_H;
    n.fx = n.x;
    n.fy = n.y;
  });

  simulation = d3.forceSimulation(nodesCopy)
    .force('link', d3.forceLink(linksCopy).id(d => d.id).strength(0))
    .alphaDecay(1);

  render(nodesCopy, linksCopy, simulation, true, ROW_H, TOP);
  simulation.tick();
  setTimeout(() => fitGraph(nodesCopy), 50);
}

  const nodesCopy = nodes.map(d => ({ ...d }));
  const linksCopy = links.map(d => ({ ...d }));

  nodesCopy.forEach(n => { delete n.fx; delete n.fy; });

  simulation = d3.forceSimulation(nodesCopy)
    .force('link', d3.forceLink(linksCopy).id(d => d.id).distance(100).strength(0.5))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(W() / 2, H() / 2))
    .force('collide', d3.forceCollide().radius(d => nodeR(d) + 20).strength(0.9));

  render(nodesCopy, linksCopy, simulation, false, 0, 0);
  setTimeout(() => fitGraph(nodesCopy), 2000);
}

function fitGraph(nodesData) {
  const xs = nodesData.map(n => n.x).filter(Boolean);
  const ys = nodesData.map(n => n.y).filter(Boolean);
  if (!xs.length) return;
  const minX = Math.min(...xs) - 60, maxX = Math.max(...xs) + 60;
  const minY = Math.min(...ys) - 60, maxY = Math.max(...ys) + 60;
  const gw = maxX - minX, gh = maxY - minY;
  const scale = Math.min(0.95, Math.min(W() / gw, H() / gh));
  const tx = (W() - gw * scale) / 2 - minX * scale;
  const ty = (H() - gh * scale) / 2 - minY * scale;
  svg.transition().duration(800).call(
    zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(nodesData, linksData, sim, layered, ROW_H, TOP) {
  g.selectAll('*').remove();

  // Generation row guide lines
  if (layered) {
    const labelG = g.append('g').attr('class', 'row-labels');
    [1,2,3,4,5].forEach(gen => {
      const y = TOP + (gen - 1) * ROW_H;
      labelG.append('line')
        .attr('x1', -2000).attr('x2', 2000)
        .attr('y1', y).attr('y2', y)
        .attr('stroke', genColors[gen])
        .attr('stroke-opacity', 0.07)
        .attr('stroke-width', 1)
        .attr('stroke-dasharray', '4 8');
      labelG.append('text')
        .attr('x', -60).attr('y', y)
        .attr('dy', '0.35em')
        .attr('text-anchor', 'end')
        .attr('font-size', 11)
        .attr('font-weight', 700)
        .attr('fill', genColors[gen])
        .attr('opacity', 0.55)
        .text(`Gen ${gen}`);
    });
  }

  // ── Connectors: two lines per link (vertical + horizontal elbow) ──
  // Using <line> elements instead of <path> to avoid any fill issues.
  const linkGroup = g.append('g').attr('class', 'links');

  // We'll store refs so we can update on tick/drag
  const linkLines = []; // each entry: { seg1, seg2, d }
  linksData.forEach(d => {
    const seg1 = linkGroup.append('line').attr('class', 'link');
    const seg2 = linkGroup.append('line').attr('class', 'link');
    linkLines.push({ seg1, seg2, d });
  });

  function updateLinks() {
    linkLines.forEach(({ seg1, seg2, d }) => {
      const sx = d.source.x, sy = d.source.y + nodeR(d.source);
      const tx = d.target.x, ty = d.target.y - nodeR(d.target);
      const my = (sy + ty) / 2;
      // Vertical from parent down to midpoint
      seg1.attr('x1', sx).attr('y1', sy).attr('x2', sx).attr('y2', my);
      // Horizontal across, then vertical to child
      seg2.attr('x1', sx).attr('y1', my).attr('x2', tx).attr('y2', my);
      // Third segment: vertical from midpoint to child — reuse seg2 as horizontal, add seg3
    });
  }

  // Actually we need 3 segments. Redo with 3 lines per link.
  linkGroup.selectAll('*').remove();
  const linkSegs = [];
  linksData.forEach(d => {
    const a = linkGroup.append('line').attr('class', 'link');
    const b = linkGroup.append('line').attr('class', 'link');
    const c = linkGroup.append('line').attr('class', 'link');
    linkSegs.push({ a, b, c, d });
  });

  function drawLinks() {
    linkSegs.forEach(({ a, b, c, d }) => {
      const sx = d.source.x;
      const sy = d.source.y + nodeR(d.source);
      const tx = d.target.x;
      const ty = d.target.y - nodeR(d.target);
      const midY = (sy + ty) / 2;

      a.attr('x1', sx).attr('y1', sy)
       .attr('x2', sx).attr('y2', midY);
      b.attr('x1', sx).attr('y1', midY)
       .attr('x2', tx).attr('y2', midY);
      c.attr('x1', tx).attr('y1', midY)
       .attr('x2', tx).attr('y2', ty);
    });
  }
  // Expose for drag updates
  function linkPath() { drawLinks(); }
  const node = g.append('g').attr('class', 'nodes')
    .selectAll('.node')
    .data(nodesData)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => {
        if (!e.active && sim.alpha) sim.alphaTarget(0.3).restart();
        d.fx = d.x;
        if (!layered) d.fy = d.y;
      })
      .on('drag', (e, d) => {
        d.fx = e.x;
        if (!layered) d.fy = e.y;
        else d.fy = d.y;  // keep Y locked
        // Manual re-render for static layered layout
        if (layered) {
          d.x = e.x;
          drawLinks();
          node.attr('transform', nd => `translate(${nd.x},${nd.y})`);
        }
      })
      .on('end', (e, d) => {
        if (!e.active && sim.alphaTarget) sim.alphaTarget(0);
        if (!layered) { d.fx = null; d.fy = null; }
        // In layered mode keep fx so node stays where dropped
      })
    );

  // Background circle
  node.append('circle')
    .attr('class', 'bg')
    .attr('r', d => nodeR(d))
    .attr('fill', d => d.photo ? 'var(--surface)' : genColors[d.gen] + '22')
    .attr('stroke', d => genColors[d.gen])
    .attr('stroke-opacity', 0.85)
    .attr('stroke-width', 2.5);

  // Photo or emoji placeholder
  node.each(function(d) {
    const el = d3.select(this);
    const r = nodeR(d);
    if (d.photo) {
      el.append('image')
        .attr('href', d.photo)
        .attr('x', -r).attr('y', -r)
        .attr('width', r * 2).attr('height', r * 2)
        .attr('clip-path', `url(#clip-${d.id})`)
        .attr('preserveAspectRatio', 'xMidYMid slice')
        .on('click', (_, d) => openLightbox(d))
        .on('mouseenter', (e, d) => showTooltip(e, d))
        .on('mouseleave', hideTooltip);
    } else {
      el.append('text')
        .attr('dy', '0.35em')
        .attr('font-size', r * 0.65)
        .style('fill', genColors[d.gen])
        .attr('text-anchor', 'middle')
        .text('🐱');
    }
  });

  // Name label
  node.append('text')
    .attr('y', d => nodeR(d) + 14)
    .text(d => d.name)
    .attr('font-size', d => d.gen <= 2 ? 12 : d.gen === 3 ? 11 : 10)
    .attr('fill', 'var(--text)')
    .attr('font-weight', d => d.gen <= 2 ? 700 : 600);

  // ── Interactions ──
  node.on('mouseenter', (e, d) => {
    showTooltip(e, d);
    highlightConnected(d);
  }).on('mouseleave', () => {
    hideTooltip();
    clearHighlight();
  }).on('click', (e, d) => {
    if (d.photo) openLightbox(d);
  });

  function highlightConnected(d) {
    const connectedIds = new Set([d.id]);
    linksData.forEach(l => {
      const src = l.source.id || l.source;
      const tgt = l.target.id || l.target;
      if (src === d.id) connectedIds.add(tgt);
      if (tgt === d.id) connectedIds.add(src);
    });
    node.classed('dimmed', n => !connectedIds.has(n.id));
    linkSegs.forEach(({ a, b, c, d: l }) => {
      const src = l.source.id || l.source;
      const tgt = l.target.id || l.target;
      const dim = !(connectedIds.has(src) && connectedIds.has(tgt));
      a.classed('dimmed', dim);
      b.classed('dimmed', dim);
      c.classed('dimmed', dim);
    });
  }

  function clearHighlight() {
    node.classed('dimmed', false);
    linkSegs.forEach(({ a, b, c }) => {
      a.classed('dimmed', false);
      b.classed('dimmed', false);
      c.classed('dimmed', false);
    });
  }

  // ── Elbow connectors: down from parent, horizontal, down to child ──
  function linkPath(d) {
    const sx = d.source.x, sy = d.source.y + nodeR(d.source);
    const tx = d.target.x, ty = d.target.y - nodeR(d.target);
    const my = (sy + ty) / 2;
    return `M${sx},${sy} L${sx},${my} L${tx},${my} L${tx},${ty}`;
  }

  // Draw once immediately (static layered layout), then keep updating for force layout
  function draw() {
    drawLinks();
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  }
  draw();
  sim.on('tick', draw);

  // Legend filter
  document.querySelectorAll('.legend-item').forEach(li => {
    li.onclick = () => {
      const gen = +li.dataset.gen;
      const wasActive = !li.classList.contains('dimmed');
      if (wasActive) li.classList.add('dimmed'); else li.classList.remove('dimmed');
      const hiddenGens = new Set(
        Array.from(document.querySelectorAll('.legend-item.dimmed')).map(x => +x.dataset.gen)
      );
      node.classed('dimmed', d => hiddenGens.has(d.gen));
      linkSegs.forEach(({ a, b, c, d: l }) => {
        const src = nodesData.find(n => n.id === (l.source.id || l.source));
        const tgt = nodesData.find(n => n.id === (l.target.id || l.target));
        const dim = hiddenGens.has(src?.gen) || hiddenGens.has(tgt?.gen);
        a.classed('dimmed', dim);
        b.classed('dimmed', dim);
        c.classed('dimmed', dim);
      });
    };
  });
}

// ── TOOLTIP ──────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let ttTimer;

function showTooltip(e, d) {
  clearTimeout(ttTimer);
  const genCol = genColors[d.gen];

  tooltip.innerHTML = `
    ${d.photo
      ? `<img src="${d.photo}" alt="${d.name}" ondblclick="openLightboxById('${d.id}')" style="cursor:zoom-in">`
      : `<div class="no-photo"><i class="material-icons" style="font-size:40px">pets</i></div>`
    }
    <h3>${d.name}</h3>
    <span class="gen-badge" style="background:${genCol}22;color:${genCol};box-shadow:0 0 0 1px ${genCol}44">
      Gen ${d.gen}
    </span>
    ${d.birth ? `<div class="birth"><i class="material-icons" style="font-size:11px">calendar_today</i>${d.birth}</div>` : ''}
  `;

  const rect = wrap.getBoundingClientRect();
  let x = e.clientX - rect.left + 16;
  let y = e.clientY - rect.top + 16;
  if (x + 190 > W()) x = e.clientX - rect.left - 196;
  if (y + 230 > H()) y = e.clientY - rect.top - 240;

  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
  tooltip.classList.add('show');
}

function hideTooltip() {
  ttTimer = setTimeout(() => tooltip.classList.remove('show'), 120);
}

// ── LIGHTBOX ─────────────────────────────────────────────────────────────────
const lightbox = document.getElementById('lightbox');
const lbImg    = document.getElementById('lb-img');
const lbName   = document.getElementById('lb-name');

function openLightbox(d) {
  if (!d.photo) return;
  lbImg.src = d.photo;
  lbImg.alt = d.name;
  lbName.textContent = d.name;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openLightboxById(id) {
  const d = nodes.find(n => n.id === id);
  if (d) openLightbox(d);
}

document.getElementById('lb-close').onclick = () => {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
};
lightbox.addEventListener('click', e => {
  if (e.target === lightbox) { lightbox.classList.remove('open'); document.body.style.overflow = ''; }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && lightbox.classList.contains('open')) {
    lightbox.classList.remove('open'); document.body.style.overflow = '';
  }
});

// ── ZOOM CONTROLS ────────────────────────────────────────────────────────────
document.getElementById('zoom-in').onclick  = () => svg.transition().duration(300).call(zoom.scaleBy, 1.4);
document.getElementById('zoom-out').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.7);

document.getElementById('layout-force').onclick = () => buildForceLayout();
document.getElementById('layout-tree').onclick  = () => buildLayeredLayout();

// ── THEME ────────────────────────────────────────────────────────────────────
const themeBtn  = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-icon');

function setThemeIcon() {
  themeIcon.textContent = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
}
setThemeIcon();

themeBtn.addEventListener('click', () => {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
  setThemeIcon();
});

// ── INIT ─────────────────────────────────────────────────────────────────────
buildLayeredLayout();

document.getElementById('fit-view').onclick = () => {
  // Collect current node positions from the zoom layer
  const pts = [];
  g.selectAll('.node').each(function(d) { if (d.x && d.y) pts.push(d); });
  if (pts.length) fitGraph(pts);
};

window.addEventListener('resize', () => {
  if (simulation) {
    simulation.force('centerX', d3.forceX(W() / 2).strength(0.04));
    simulation.alphaTarget(0.1).restart();
    setTimeout(() => simulation.alphaTarget(0), 600);
  }
});
</script>
</body>
