<!DOCTYPE html>
<html lang="nl" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katten Stamboom — Jeroen van Hoof</title>
  <meta name="description" content="Katten Stamboom - Een interactieve grafiek van onze geliefde familiekatten.">
  <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" href="../build/img/j.svg">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>

  <script>
    if (localStorage.getItem('color-theme') === 'dark' ||
        (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body>

<!-- LIGHTBOX -->
<div id="lightbox" role="dialog" aria-modal="true">
  <button id="lb-close" aria-label="Sluiten"><i class="material-icons">close</i></button>
  <img id="lb-img" src="" alt="">
  <div id="lb-name"></div>
</div>

<!-- BOTTOM SHEET (mobile cat card) -->
<div id="bottom-sheet" aria-modal="true">
  <div class="sheet-handle"></div>
  <button id="sheet-close" aria-label="Sluiten"><i class="material-icons">close</i></button>
  <div class="sheet-inner">
    <div id="sheet-photo"></div>
    <div class="sheet-info">
      <h3 id="sheet-name"></h3>
      <span class="gen-badge" id="sheet-gen"></span>
      <div class="birth" id="sheet-birth" style="display:none">
        <i class="material-icons" style="font-size:12px">calendar_today</i>
        <span id="sheet-birth-text"></span>
      </div>
    </div>
  </div>
  <div class="sheet-actions">
    <button class="sheet-btn" id="sheet-parents-btn" style="display:none">
      <i class="material-icons" style="font-size:16px">arrow_upward</i> Ouders
    </button>
    <button class="sheet-btn primary" id="sheet-photo-btn" style="display:none">
      <i class="material-icons" style="font-size:16px">photo_size_select_actual</i> Foto
    </button>
  </div>
</div>

<!-- NAVBAR -->
<nav>
  <div class="nav-logo">
    <a href="../index.html">
      <svg width="28" height="28" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
        <defs><style>html.dark svg path{fill:white!important}html.dark svg rect{stroke:white!important}html:not(.dark) svg path{fill:black!important}html:not(.dark) svg rect{stroke:black!important}</style></defs>
        <g>
          <path d="M 100.65222,142.27747 V 58.277726 h 24.89189 v 83.999744 q 0,12.15457 -5.32803,20.89587 -5.32803,8.65805 -14.56884,13.32008 -9.157549,4.66202 -20.646116,4.66202 -11.904819,0 -21.062373,-3.99602 -9.157553,-3.99602 -14.402334,-12.23782 -5.24478,-8.32505 -5.24478,-21.06237 h 25.058396 q 0,6.66003 1.831511,10.57281 1.914761,3.91277 5.411281,5.57778 3.496521,1.66501 8.408299,1.66501 4.745278,0 8.241798,-2.24776 3.496521,-2.24777 5.411282,-6.57679 1.998016,-4.32903 1.998016,-10.57281 z m 111.05614,37.21296 v 18.23186 h -75.59144 v -18.23186 z"/>
          <rect style="fill:none;stroke-width:17.8144" width="224.11226" height="219.19101" x="15.943868" y="18.404495"/>
        </g>
      </svg>
    </a>
  </div>
  <div class="nav-links">
    <a href="../index.html#projects">Projects</a>
    <a href="index.html" class="active">Cats</a>
  </div>
  <div class="nav-right">
    <button id="theme-toggle" aria-label="Toggle dark mode">
      <i class="material-icons" id="theme-icon">dark_mode</i>
    </button>
  </div>
</nav>

<!-- CANVAS -->
<div class="canvas-wrap">
  <svg id="graph-svg"></svg>

  <!-- LEGEND TOGGLE (mobile only) -->
  <button class="legend-toggle" id="legend-toggle-btn" aria-label="Generaties">
    <i class="material-icons" style="font-size:20px">layers</i>
  </button>

  <!-- LEGEND -->
  <div class="legend" id="legend-panel">
    <h4>Generatie</h4>
    <div class="legend-item" data-gen="1"><div class="legend-dot" style="background:var(--gen1)"></div> Gen 1</div>
    <div class="legend-item" data-gen="2"><div class="legend-dot" style="background:var(--gen2)"></div> Gen 2</div>
    <div class="legend-item" data-gen="3"><div class="legend-dot" style="background:var(--gen3)"></div> Gen 3</div>
    <div class="legend-item" data-gen="4"><div class="legend-dot" style="background:var(--gen4)"></div> Gen 4</div>
    <div class="legend-item" data-gen="5"><div class="legend-dot" style="background:var(--gen5)"></div> Gen 5</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="ctrl-btn" id="zoom-in"  title="Zoom in" aria-label="Zoom in"><i class="material-icons">add</i></button>
    <button class="ctrl-btn" id="zoom-out" title="Zoom uit" aria-label="Zoom uit"><i class="material-icons">remove</i></button>
    <div class="ctrl-divider"></div>
    <button class="ctrl-btn" id="fit-view" title="Alles zichtbaar" aria-label="Alles zichtbaar"><i class="material-icons">fit_screen</i></button>
    <div class="ctrl-divider"></div>
    <button class="ctrl-btn" id="layout-force"  title="Force layout" aria-label="Force layout"><i class="material-icons">hub</i></button>
    <button class="ctrl-btn" id="layout-tree" title="Boom layout" aria-label="Boom layout"><i class="material-icons">account_tree</i></button>
  </div>

  <!-- TOOLTIP (desktop) -->
  <div id="tooltip"></div>
</div>

<script type="module">
  import { initGraph, buildForceLayout, buildLayeredLayout, zoomIn, zoomOut, fitView } from './graph.js';
  import { initUI, openBottomSheet, showTooltip, hideTooltip, openLightbox, setClearHighlight } from './ui.js';

  const uiHandlers = {
    openBottomSheet,
    showTooltip,
    hideTooltip,
    openLightbox
  };

  initGraph(uiHandlers);
  initUI(uiHandlers);

  // Wire up control buttons
  document.getElementById('zoom-in').onclick = zoomIn;
  document.getElementById('zoom-out').onclick = zoomOut;
  document.getElementById('fit-view').onclick = fitView;
  document.getElementById('layout-force').onclick = () => buildForceLayout(uiHandlers);
  document.getElementById('layout-tree').onclick = () => buildLayeredLayout(uiHandlers);
</script>
</body>
</html>
