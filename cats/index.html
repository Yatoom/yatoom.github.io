<!DOCTYPE html>
<html lang="nl" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katten Stamboom — Jeroen van Hoof</title>
  <meta name="description" content="Katten Stamboom - Een interactieve grafiek van onze geliefde familiekatten.">
  <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" href="../build/img/j.svg">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f1f5f9;
      --surface:  #ffffff;
      --border:   rgba(0,0,0,.08);
      --text:     #0f172a;
      --muted:    #64748b;
      --accent:   #3b82f6;

      --gen1: #f59e0b;
      --gen2: #10b981;
      --gen3: #3b82f6;
      --gen4: #a855f7;
      --gen5: #ec4899;
    }

    html.dark {
      --bg:      #0f172a;
      --surface: #1e293b;
      --border:  rgba(255,255,255,.07);
      --text:    #f1f5f9;
      --muted:   #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background .3s, color .3s;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── NAVBAR ── */
    nav {
      flex: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    nav a { text-decoration: none; color: var(--muted); font-size: 13px; font-weight: 600; transition: color .2s; }
    nav a:hover, nav a.active { color: var(--accent); }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-links { display: flex; gap: 24px; }
    .nav-right { display: flex; align-items: center; gap: 4px; }
    #theme-toggle {
      background: none; border: none; cursor: pointer;
      color: var(--muted); width: 40px; height: 40px;
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    #theme-toggle:hover { background: var(--border); }

    /* ── MAIN CANVAS AREA ── */
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #graph-svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #graph-svg:active { cursor: grabbing; }

    /* ── CONTROLS ── */
    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      z-index: 10;
      white-space: nowrap;
    }
    .ctrl-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); width: 40px; height: 40px;
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; transition: background .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
      min-width: 40px;
    }
    .ctrl-btn:hover, .ctrl-btn:active { background: var(--border); color: var(--text); }
    .ctrl-divider { width: 1px; height: 20px; background: var(--border); flex: none; }

    /* ── LEGEND (slide-up panel on mobile) ── */
    .legend-toggle {
      display: none;
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px; height: 40px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      cursor: pointer;
      color: var(--muted);
      align-items: center;
      justify-content: center;
      z-index: 20;
      -webkit-tap-highlight-color: transparent;
    }

    .legend {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      z-index: 10;
      min-width: 130px;
      transition: opacity .2s, transform .2s;
    }
    .legend h4 {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted); margin-bottom: 10px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text); margin-bottom: 6px; cursor: pointer;
      opacity: 1; transition: opacity .2s;
      padding: 3px 0;
      min-height: 28px;
    }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-item.dimmed { opacity: .3; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }

    /* ── NODE CARD (bottom sheet on mobile, tooltip on desktop) ── */
    #tooltip {
      position: absolute;
      pointer-events: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 16px 48px rgba(0,0,0,.18);
      width: 180px;
      z-index: 200;
      opacity: 0;
      transform: scale(.95) translateY(4px);
      transition: opacity .18s, transform .18s;
    }
    #tooltip.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    #tooltip img {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      border-radius: 10px; margin-bottom: 10px;
      display: block;
    }
    #tooltip .no-photo {
      width: 100%; aspect-ratio: 1;
      background: var(--bg);
      border-radius: 10px; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
    }
    #tooltip h3 { font-size: 14px; font-weight: 700; color: var(--text); }
    #tooltip .gen-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 999px;
      font-size: 10px; font-weight: 700; margin-top: 4px;
    }
    #tooltip .birth {
      font-size: 10px; color: var(--muted); margin-top: 6px;
      display: flex; align-items: center; gap: 4px;
    }

    /* ── BOTTOM SHEET (mobile cat card) ── */
    #bottom-sheet {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 16px 20px 32px;
      box-shadow: 0 -8px 40px rgba(0,0,0,.18);
      z-index: 300;
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.32,0,.15,1);
    }
    #bottom-sheet.open { transform: translateY(0); }
    #bottom-sheet .sheet-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border);
      margin: 0 auto 14px;
    }
    #bottom-sheet .sheet-inner {
      display: flex; gap: 14px; align-items: flex-start;
    }
    #bottom-sheet img {
      width: 72px; height: 72px; border-radius: 12px;
      object-fit: cover; flex: none;
    }
    #bottom-sheet .no-photo-sm {
      width: 72px; height: 72px; border-radius: 12px;
      background: var(--bg); display: flex; align-items: center;
      justify-content: center; color: var(--muted); flex: none;
      font-size: 32px;
    }
    #bottom-sheet .sheet-info { flex: 1; min-width: 0; }
    #bottom-sheet h3 { font-size: 17px; font-weight: 700; color: var(--text); }
    #bottom-sheet .gen-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700; margin-top: 6px;
    }
    #bottom-sheet .birth {
      font-size: 12px; color: var(--muted); margin-top: 8px;
      display: flex; align-items: center; gap: 4px;
    }
    #bottom-sheet .sheet-actions {
      display: flex; gap: 8px; margin-top: 14px;
    }
    #bottom-sheet .sheet-btn {
      flex: 1; padding: 10px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    #bottom-sheet .sheet-btn.primary {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    #bottom-sheet .sheet-btn:active { opacity: .8; }
    #sheet-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.88); backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: min(90vw, 800px); max-height: 85vh;
      border-radius: 16px; object-fit: contain;
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }
    #lb-name {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.6); color: #fff; font-weight: 700; font-size: 15px;
      padding: 8px 20px; border-radius: 999px; backdrop-filter: blur(4px);
      white-space: nowrap;
    }
    #lb-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,.1); border: none; color: #fff;
      width: 48px; height: 48px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
      -webkit-tap-highlight-color: transparent;
    }
    #lb-close:hover { background: rgba(255,255,255,.2); }

    /* ── SVG NODES ── */
    .node circle.bg {
      stroke-width: 3;
      cursor: pointer;
    }
    .node image { cursor: pointer; }
    .node text {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      fill: var(--text);
      pointer-events: none;
      text-anchor: middle;
    }
    .link {
      stroke: var(--muted);
      stroke-opacity: .18;
      stroke-width: 1;
      fill: none;
    }

    .node.dimmed { opacity: .15; }
    .link.dimmed  { opacity: .05; }

    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── MOBILE OVERRIDES ── */
    @media (max-width: 600px) {
      nav { padding: 0 12px; height: 52px; }
      .nav-links { display: none; }

      /* Show legend toggle button, hide always-on legend */
      .legend-toggle { display: flex; }
      .legend {
        top: 60px; /* below toggle, slide down */
        right: 12px;
        transform-origin: top right;
        transform: scale(.92) translateY(-8px);
        opacity: 0;
        pointer-events: none;
        transition: opacity .18s, transform .18s;
      }
      .legend.visible {
        opacity: 1;
        transform: scale(1) translateY(0);
        pointer-events: auto;
      }

      /* Hide desktop tooltip on mobile */
      #tooltip { display: none !important; }

      /* Show bottom sheet on mobile */
      #bottom-sheet { display: block; }

      .controls {
        bottom: 16px;
        padding: 4px 6px;
        gap: 2px;
      }
      .ctrl-btn { width: 44px; height: 44px; font-size: 22px; }
    }

    @media (min-width: 601px) {
      #bottom-sheet { display: none !important; }
    }
  </style>

  <script>
    if (localStorage.getItem('color-theme') === 'dark' ||
        (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body>

<!-- LIGHTBOX -->
<div id="lightbox" role="dialog" aria-modal="true">
  <button id="lb-close" aria-label="Sluiten"><i class="material-icons">close</i></button>
  <img id="lb-img" src="" alt="">
  <div id="lb-name"></div>
</div>

<!-- BOTTOM SHEET (mobile cat card) -->
<div id="bottom-sheet" aria-modal="true">
  <div class="sheet-handle"></div>
  <button id="sheet-close" aria-label="Sluiten"><i class="material-icons">close</i></button>
  <div class="sheet-inner">
    <div id="sheet-photo"></div>
    <div class="sheet-info">
      <h3 id="sheet-name"></h3>
      <span class="gen-badge" id="sheet-gen"></span>
      <div class="birth" id="sheet-birth" style="display:none">
        <i class="material-icons" style="font-size:12px">calendar_today</i>
        <span id="sheet-birth-text"></span>
      </div>
    </div>
  </div>
  <div class="sheet-actions">
    <button class="sheet-btn" id="sheet-parents-btn" style="display:none">
      <i class="material-icons" style="font-size:16px">arrow_upward</i> Ouders
    </button>
    <button class="sheet-btn primary" id="sheet-photo-btn" style="display:none">
      <i class="material-icons" style="font-size:16px">photo_size_select_actual</i> Foto
    </button>
  </div>
</div>

<!-- NAVBAR -->
<nav>

  <div class="nav-links">

<!-- CANVAS -->
<div class="canvas-wrap">

    <div class="ctrl-divider"></div>
    <button class="ctrl-btn" id="layout-force"  title="Force layout" aria-label="Force layout"><i class="material-icons">hub</i></button>

  </div>

  <!-- TOOLTIP (desktop) -->
  <div id="tooltip"></div>
</div>

  { id: '4',    name: '4',    gen: 5, photo: null, birth: null },
  { id: '5',    name: '5',    gen: 5, photo: null, birth: null },
];

const links = [
  { source: 'ginny',      target: 'ruby' },
  { source: 'safira',     target: 'roosje' },
  { source: 'safira',     target: 'midnight' },
  { source: 'safira',     target: 'sparkle' },
  { source: 'safira',     target: 'lieffie' },
  { source: 'safira',     target: 'lily' },
  { source: 'safira',     target: 'royke' },
  { source: 'lily',       target: 'speedy' },
  { source: 'lily',       target: 'piraatje' },
  { source: 'lily',       target: 'bloesempje' },
  { source: 'lily',       target: 'schatje' },
  { source: 'lily',       target: 'lillifee' },
  { source: 'speedy',     target: 'flip' },
  { source: 'speedy',     target: 'fjoepie' },
  { source: 'speedy',     target: 'spilly' },
  { source: 'speedy',     target: 'noodle' },
  { source: 'speedy',     target: 'nibbit' },
  { source: 'piraatje',   target: 'streepje' },
  { source: 'piraatje',   target: 'ziva' },
  { source: 'piraatje',   target: 'zara' },
  { source: 'piraatje',   target: 'sunny' },
  { source: 'piraatje',   target: 'sneeuwvlokje' },
  { source: 'piraatje',   target: 'oreo' },
  { source: 'bloesempje', target: 'bambi' },
  { source: 'bloesempje', target: 'shadow' },
  { source: 'bloesempje', target: 'charlie' },
  { source: 'bloesempje', target: 'noortje' },
  { source: 'bloesempje', target: 'snowy' },
  { source: 'ziva',       target: 'kleintje' },
  { source: 'ziva',       target: 'charcoal' },
  { source: 'ziva',       target: 'copper' },
  { source: 'ziva',       target: 'grijsje' },
  { source: 'ziva',       target: 'bruintje' },
  { source: 'ziva',       target: 'pip' },
  { source: 'ziva',       target: 'roodje' },
  { source: 'fjoepie',    target: 'flynnflo' },
  { source: 'zara',       target: '1' },
  { source: 'zara',       target: '2' },
  { source: 'zara',       target: '3' },
  { source: 'zara',       target: '4' },
  { source: 'zara',       target: '5' },
];

// Build parent lookup for the bottom sheet
const parentOf = {};
links.forEach(l => {
  if (!parentOf[l.target]) parentOf[l.target] = [];
  parentOf[l.target].push(l.source);
});

// ── COLOURS ──────────────────────────────────────────────────────────────────
const genColors = { 1:'#f59e0b', 2:'#10b981', 3:'#3b82f6', 4:'#a855f7', 5:'#ec4899' };

// ── SETUP ────────────────────────────────────────────────────────────────────
const svg  = d3.select('#graph-svg');
const wrap = document.querySelector('.canvas-wrap');
const W    = () => wrap.clientWidth;
const H    = () => wrap.clientHeight;

const defs = svg.append('defs');
nodes.forEach(n => {
  defs.append('clipPath').attr('id', `clip-${n.id}`)
    .append('circle').attr('r', nodeR(n));
});

function nodeR(n) {
  if (isMobile()) {
    // Slightly larger on mobile for easier tapping
    if (n.gen === 1) return 36;
    if (n.gen === 2) return 29;
    if (n.gen === 3) return 24;
    if (n.gen === 4) return 20;
    return 17;
  }
  if (n.gen === 1) return 32;
  if (n.gen === 2) return 26;
  if (n.gen === 3) return 22;
  if (n.gen === 4) return 18;
  return 15;
}

const g = svg.append('g').attr('class', 'zoom-layer');

const zoom = d3.zoom()
  .scaleExtent([0.08, 6])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

// ── LAYOUT ───────────────────────────────────────────────────────────────────
let simulation;
let currentNodesData = [];

function buildLayeredLayout() {
  if (simulation) simulation.stop();

  const nodesCopy = nodes.map(d => ({ ...d }));
  const linksCopy = links.map(d => ({ ...d }));

  const mobile = isMobile();
  const ROW_H       = mobile ? 130 : 148;
  const TOP         = mobile ? 60  : 75;
  const NODE_W      = mobile ? 68  : 76;
  const SIBLING_GAP = mobile ? 6   : 8;
  const FAMILY_GAP  = mobile ? 28  : 38;

  const childrenOf = {};
  links.forEach(l => {
    if (!childrenOf[l.source]) childrenOf[l.source] = [];
    childrenOf[l.source].push(l.target);
  });

  const childIds  = new Set(links.map(l => l.target));
  const roots     = nodesCopy.filter(n => !childIds.has(n.id));
  const subtreeW  = {};

  function calcWidth(id) {
    const kids = childrenOf[id] || [];
    if (!kids.length) { subtreeW[id] = NODE_W; return NODE_W; }
    let w = kids.reduce((sum, kid, i) =>
      sum + calcWidth(kid) + (i < kids.length - 1 ? SIBLING_GAP : 0), 0);
    subtreeW[id] = w;
    return w;
  }
  roots.forEach(r => calcWidth(r.id));

  const xPos = {};
  function assignX(id, left) {
    const kids = childrenOf[id] || [];
    if (!kids.length) { xPos[id] = left + NODE_W / 2; return; }
    let cursor = left;
    kids.forEach(kid => { assignX(kid, cursor); cursor += subtreeW[kid] + SIBLING_GAP; });
    xPos[id] = (xPos[kids[0]] + xPos[kids[kids.length - 1]]) / 2;
  }

  let cursor = 0;
  roots.forEach(root => { assignX(root.id, cursor); cursor += subtreeW[root.id] + FAMILY_GAP; });

  nodesCopy.forEach(n => {
    n.x  = xPos[n.id] || 0;
    n.y  = TOP + (n.gen - 1) * ROW_H;
    n.fx = n.x;
    n.fy = n.y;
  });

  simulation = d3.forceSimulation(nodesCopy)
    .force('link', d3.forceLink(linksCopy).id(d => d.id).strength(0))
    .alphaDecay(1);

  currentNodesData = nodesCopy;
  render(nodesCopy, linksCopy, simulation, true, ROW_H, TOP);
  simulation.tick();
  setTimeout(() => fitGraph(nodesCopy), 50);
}

function buildForceLayout() {
  if (simulation) simulation.stop();

  const nodesCopy = nodes.map(d => ({ ...d }));
  const linksCopy = links.map(d => ({ ...d }));
  nodesCopy.forEach(n => { delete n.fx; delete n.fy; });

  simulation = d3.forceSimulation(nodesCopy)
    .force('link', d3.forceLink(linksCopy).id(d => d.id).distance(isMobile() ? 80 : 100).strength(0.5))
    .force('charge', d3.forceManyBody().strength(-280))
    .force('center', d3.forceCenter(W() / 2, H() / 2))
    .force('collide', d3.forceCollide().radius(d => nodeR(d) + 18).strength(0.9));

  currentNodesData = nodesCopy;
  render(nodesCopy, linksCopy, simulation, false, 0, 0);
  setTimeout(() => fitGraph(nodesCopy), 2000);
}

function fitGraph(nodesData) {
  const xs = nodesData.map(n => n.x).filter(Boolean);
  const ys = nodesData.map(n => n.y).filter(Boolean);
  if (!xs.length) return;
  const pad  = isMobile() ? 40 : 60;
  const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
  const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
  const gw   = maxX - minX, gh = maxY - minY;
  const scale = Math.min(isMobile() ? 0.92 : 0.95, Math.min(W() / gw, H() / gh));
  const tx   = (W() - gw * scale) / 2 - minX * scale;
  const ty   = (H() - gh * scale) / 2 - minY * scale;
  svg.transition().duration(800).call(
    zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(nodesData, linksData, sim, layered, ROW_H, TOP) {
  g.selectAll('*').remove();

  if (layered) {
    const labelG = g.append('g').attr('class', 'row-labels');
    [1,2,3,4,5].forEach(gen => {
      const y = TOP + (gen - 1) * ROW_H;
      labelG.append('line')
        .attr('x1', -2000).attr('x2', 2000).attr('y1', y).attr('y2', y)
        .attr('stroke', genColors[gen]).attr('stroke-opacity', 0.07)
        .attr('stroke-width', 1).attr('stroke-dasharray', '4 8');
      labelG.append('text')
        .attr('x', -60).attr('y', y).attr('dy', '0.35em')
        .attr('text-anchor', 'end').attr('font-size', 11).attr('font-weight', 700)
        .attr('fill', genColors[gen]).attr('opacity', 0.55)
        .text(`Gen ${gen}`);
    });
  }

  const linkGroup = g.append('g').attr('class', 'links');
  const linkSegs  = [];
  linksData.forEach(d => {
    const a = linkGroup.append('line').attr('class', 'link');
    const b = linkGroup.append('line').attr('class', 'link');
    const c = linkGroup.append('line').attr('class', 'link');
    linkSegs.push({ a, b, c, d });
  });

  function drawLinks() {
    linkSegs.forEach(({ a, b, c, d }) => {
      const sx   = d.source.x,  sy = d.source.y + nodeR(d.source);
      const tx   = d.target.x,  ty = d.target.y - nodeR(d.target);
      const midY = (sy + ty) / 2;
      a.attr('x1', sx).attr('y1', sy).attr('x2', sx).attr('y2', midY);
      b.attr('x1', sx).attr('y1', midY).attr('x2', tx).attr('y2', midY);
      c.attr('x1', tx).attr('y1', midY).attr('x2', tx).attr('y2', ty);
    });
  }

  // Touch target enlarger (invisible bigger circle on mobile)
  const node = g.append('g').attr('class', 'nodes')
    .selectAll('.node')
    .data(nodesData)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => {
        if (!e.active && sim.alpha) sim.alphaTarget(0.3).restart();
        d.fx = d.x;
        if (!layered) d.fy = d.y;
      })
      .on('drag', (e, d) => {
        d.fx = e.x;
        if (!layered) d.fy = e.y; else d.fy = d.y;
        if (layered) { d.x = e.x; drawLinks(); node.attr('transform', nd => `translate(${nd.x},${nd.y})`); }
      })
      .on('end', (e, d) => {
        if (!e.active && sim.alphaTarget) sim.alphaTarget(0);
        if (!layered) { d.fx = null; d.fy = null; }
      })
    );

  // Invisible hit target on mobile
  node.append('circle')
    .attr('r', d => Math.max(nodeR(d), isMobile() ? 28 : 0))
    .attr('fill', 'transparent')
    .attr('stroke', 'none');

  node.append('circle')
    .attr('class', 'bg')
    .attr('r', d => nodeR(d))
    .attr('fill', d => d.photo ? 'var(--surface)' : genColors[d.gen] + '22')
    .attr('stroke', d => genColors[d.gen])
    .attr('stroke-opacity', 0.85)
    .attr('stroke-width', 2.5);

  node.each(function(d) {
    const el = d3.select(this);
    const r  = nodeR(d);
    if (d.photo) {
      el.append('image')
        .attr('href', d.photo)
        .attr('x', -r).attr('y', -r)
        .attr('width', r * 2).attr('height', r * 2)
        .attr('clip-path', `url(#clip-${d.id})`)
        .attr('preserveAspectRatio', 'xMidYMid slice')
        .on('click', (_, d) => { if (!isMobile()) openLightbox(d); })
        .on('mouseenter', (e, d) => { if (!isMobile()) showTooltip(e, d); })
        .on('mouseleave', ()      => { if (!isMobile()) hideTooltip(); });
    } else {
      el.append('text')
        .attr('dy', '0.35em').attr('font-size', r * 0.65)
        .style('fill', genColors[d.gen]).attr('text-anchor', 'middle')
        .text('🐱');
    }
  });

  node.append('text')
    .attr('y', d => nodeR(d) + 14)
    .text(d => d.name)
    .attr('font-size', d => d.gen <= 2 ? 12 : d.gen === 3 ? 11 : 10)
    .attr('fill', 'var(--text)')
    .attr('font-weight', d => d.gen <= 2 ? 700 : 600);

  // ── Interactions ──
  node.on('mouseenter', (e, d) => {
    if (!isMobile()) { showTooltip(e, d); highlightConnected(d); }
  }).on('mouseleave', () => {
    if (!isMobile()) { hideTooltip(); clearHighlight(); }
  }).on('click', (e, d) => {
    if (isMobile()) {
      openBottomSheet(d, nodesData, linksData);
      highlightConnected(d, nodesData, linksData, node, linkSegs);
    } else {
      if (d.photo) openLightbox(d);
    }
  });

  function highlightConnected(d, nd, ld, n, ls) {
    // Use closured vars if not passed (desktop path)
    const _nd = nd || nodesData;
    const _ld = ld || linksData;
    const _n  = n  || node;
    const _ls = ls || linkSegs;

    const connectedIds = new Set([d.id]);
    _ld.forEach(l => {
      const src = l.source.id || l.source;
      const tgt = l.target.id || l.target;
      if (src === d.id) connectedIds.add(tgt);
      if (tgt === d.id) connectedIds.add(src);
    });
    _n.classed('dimmed', n => !connectedIds.has(n.id));
    _ls.forEach(({ a, b, c, d: l }) => {
      const src = l.source.id || l.source;
      const tgt = l.target.id || l.target;
      const dim = !(connectedIds.has(src) && connectedIds.has(tgt));
      a.classed('dimmed', dim); b.classed('dimmed', dim); c.classed('dimmed', dim);
    });
  }

  function clearHighlight() {
    node.classed('dimmed', false);
    linkSegs.forEach(({ a, b, c }) => {
      a.classed('dimmed', false); b.classed('dimmed', false); c.classed('dimmed', false);
    });
  }

  // Expose for bottom sheet close
  window._clearHighlight = clearHighlight;

  function draw() {
    drawLinks();
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  }
  draw();
  sim.on('tick', draw);

  // Legend filter
  document.querySelectorAll('.legend-item').forEach(li => {
    li.onclick = () => {
      li.classList.toggle('dimmed');
      const hiddenGens = new Set(
        Array.from(document.querySelectorAll('.legend-item.dimmed')).map(x => +x.dataset.gen)
      );
      node.classed('dimmed', d => hiddenGens.has(d.gen));
      linkSegs.forEach(({ a, b, c, d: l }) => {
        const src = nodesData.find(n => n.id === (l.source.id || l.source));
        const tgt = nodesData.find(n => n.id === (l.target.id || l.target));
        const dim = hiddenGens.has(src?.gen) || hiddenGens.has(tgt?.gen);
        a.classed('dimmed', dim); b.classed('dimmed', dim); c.classed('dimmed', dim);
      });
    };
  });
}

// ── BOTTOM SHEET ─────────────────────────────────────────────────────────────
const bottomSheet = document.getElementById('bottom-sheet');
let sheetOpenCat  = null;

function openBottomSheet(d, nodesData, linksData) {
  sheetOpenCat = d;
  const genCol = genColors[d.gen];

  // Photo
  const photoEl = document.getElementById('sheet-photo');
  photoEl.innerHTML = d.photo
    ? `<img src="${d.photo}" alt="${d.name}" style="cursor:zoom-in" onclick="openLightboxById('${d.id}')">`
    : `<div class="no-photo-sm">🐱</div>`;

  document.getElementById('sheet-name').textContent = d.name;

  const genBadge = document.getElementById('sheet-gen');
  genBadge.textContent  = `Gen ${d.gen}`;
  genBadge.style.background = genCol + '22';
  genBadge.style.color      = genCol;
  genBadge.style.boxShadow  = `0 0 0 1px ${genCol}44`;

  const birthRow  = document.getElementById('sheet-birth');
  const birthText = document.getElementById('sheet-birth-text');
  if (d.birth) {
    birthText.textContent = d.birth;
    birthRow.style.display = 'flex';
  } else {
    birthRow.style.display = 'none';
  }

  // Photo button
  const photoBtn = document.getElementById('sheet-photo-btn');
  if (d.photo) {
    photoBtn.style.display = 'flex';
    photoBtn.onclick = () => openLightbox(d);
  } else {
    photoBtn.style.display = 'none';
  }

  // Parents button
  const parentsBtn = document.getElementById('sheet-parents-btn');
  const parents    = (parentOf[d.id] || []);
  if (parents.length) {
    parentsBtn.style.display = 'flex';
    const parentNames = parents.map(pid => {
      const p = nodes.find(n => n.id === pid);
      return p ? p.name : pid;
    }).join(', ');
    parentsBtn.title   = parentNames;
    parentsBtn.onclick = () => {
      // Highlight first parent
      const firstParent = nodesData.find(n => n.id === parents[0]);
      if (firstParent) {
        closeBottomSheet();
        openBottomSheet(firstParent, nodesData, linksData);
        // Pan to parent
        const t = d3.zoomTransform(svg.node());
        svg.transition().duration(500).call(
          zoom.transform,
          d3.zoomIdentity
            .translate(W()/2 - firstParent.x * t.k, H()/2 - firstParent.y * t.k)
            .scale(t.k)
        );
      }
    };
  } else {
    parentsBtn.style.display = 'none';
  }

  bottomSheet.classList.add('open');
}

function closeBottomSheet() {
  bottomSheet.classList.remove('open');
  if (window._clearHighlight) window._clearHighlight();
  sheetOpenCat = null;
}

document.getElementById('sheet-close').onclick = closeBottomSheet;

// Swipe down to dismiss
let touchStartY = 0;
bottomSheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
bottomSheet.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 60) closeBottomSheet();
}, { passive: true });

// ── TOOLTIP (desktop) ─────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let ttTimer;

function showTooltip(e, d) {
  clearTimeout(ttTimer);
  const genCol = genColors[d.gen];
  tooltip.innerHTML = `
    ${d.photo
      ? `<img src="${d.photo}" alt="${d.name}" ondblclick="openLightboxById('${d.id}')" style="cursor:zoom-in">`
      : `<div class="no-photo"><i class="material-icons" style="font-size:40px">pets</i></div>`}
    <h3>${d.name}</h3>
    <span class="gen-badge" style="background:${genCol}22;color:${genCol};box-shadow:0 0 0 1px ${genCol}44">
      Gen ${d.gen}
    </span>
    ${d.birth ? `<div class="birth"><i class="material-icons" style="font-size:11px">calendar_today</i>${d.birth}</div>` : ''}
  `;
  const rect = wrap.getBoundingClientRect();
  let x = e.clientX - rect.left + 16;
  let y = e.clientY - rect.top  + 16;
  if (x + 190 > W()) x = e.clientX - rect.left - 196;
  if (y + 230 > H()) y = e.clientY - rect.top  - 240;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
  tooltip.classList.add('show');
}

function hideTooltip() {
  ttTimer = setTimeout(() => tooltip.classList.remove('show'), 120);
}

// ── LIGHTBOX ─────────────────────────────────────────────────────────────────
const lightbox = document.getElementById('lightbox');
const lbImg    = document.getElementById('lb-img');
const lbName   = document.getElementById('lb-name');

function openLightbox(d) {
  if (!d.photo) return;
  lbImg.src = d.photo; lbImg.alt = d.name;
  lbName.textContent = d.name;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openLightboxById(id) {
  const d = nodes.find(n => n.id === id);
  if (d) openLightbox(d);
}

document.getElementById('lb-close').onclick = () => {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
};
lightbox.addEventListener('click', e => {
  if (e.target === lightbox) { lightbox.classList.remove('open'); document.body.style.overflow = ''; }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (lightbox.classList.contains('open')) { lightbox.classList.remove('open'); document.body.style.overflow = ''; }
    else closeBottomSheet();
  }
});

// ── LEGEND TOGGLE (mobile) ────────────────────────────────────────────────────
const legendPanel     = document.getElementById('legend-panel');
const legendToggleBtn = document.getElementById('legend-toggle-btn');
legendToggleBtn.onclick = () => {
  legendPanel.classList.toggle('visible');
};
// Close legend when tapping outside
document.addEventListener('click', e => {
  if (!legendPanel.contains(e.target) && e.target !== legendToggleBtn) {
    legendPanel.classList.remove('visible');
  }
});

// ── ZOOM CONTROLS ─────────────────────────────────────────────────────────────
document.getElementById('zoom-in').onclick  = () => svg.transition().duration(300).call(zoom.scaleBy, 1.4);
document.getElementById('zoom-out').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.7);
document.getElementById('layout-force').onclick = () => buildForceLayout();
document.getElementById('layout-tree').onclick  = () => buildLayeredLayout();

// ── THEME ─────────────────────────────────────────────────────────────────────
const themeBtn  = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-icon');
function setThemeIcon() {
  themeIcon.textContent = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
}
setThemeIcon();
themeBtn.addEventListener('click', () => {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
  setThemeIcon();
});

// ── INIT ─────────────────────────────────────────────────────────────────────
buildLayeredLayout();

document.getElementById('fit-view').onclick = () => {
  if (currentNodesData.length) fitGraph(currentNodesData);
};

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (currentNodesData.length) fitGraph(currentNodesData);
  }, 200);
});
</script>
